function getColor(r) {
  if (r < 30) return "#2ecc71";
  if (r < 60) return "#f39c12";
  return "#e74c3c";
}

function updateMap() {
  const pathogen = document.getElementById("pathogenSelect").value;
  const antibiotic = document.getElementById("antibioticSelect").value;
  
  const filtered = allData.filter(d => 
    d.Pathogen === pathogen && d.Antibiotic === antibiotic
  );
  
  const statsDisplay = document.getElementById("statsDisplay");
  
  if (filtered.length === 0) {
    statsDisplay.innerHTML = "⚠️ No data available for this selection";
    Plotly.react("map", [], {});
    return;
  }
  
  const sorted = [...filtered].sort((a, b) => b.Resistance - a.Resistance);
  
  statsDisplay.innerHTML = `📊 Showing <b>${sorted.length}</b> cities | Resistance range: <b>${Math.min(...sorted.map(d => d.Resistance))}%</b> – <b>${Math.max(...sorted.map(d => d.Resistance))}%</b> | Highest: <b>${sorted[0].City}</b> (${sorted[0].Resistance}%)`;
  
  const trace = {
    type: "scattermapbox",
    lat: sorted.map(d => d.lat),
    lon: sorted.map(d => d.lon),
    mode: "markers+text",
    text: sorted.map(d => `${d.City}<br><b>${d.Resistance}%</b>`),
    textposition: "top center",
    textfont: {
      size: 14,
      color: "#2c3e50",
      family: "Segoe UI, Arial, sans-serif",
      weight: "bold"
    },
    marker: {
      size: sorted.map(d => Math.max(d.Resistance / 2 + 18, 25)),
      color: sorted.map(d => getColor(d.Resistance)),
      opacity: 0.9,
      line: { width: 3, color: "white" }
    },
    hovertext: sorted.map(d => 
      `<b>${d.City}</b><br>Resistance: <b>${d.Resistance}%</b><br>Tested: ${d.Tested}<br>Resistant: ${d.Resistant}`
    ),
    hoverinfo: "text",
    hovertemplate: "%{hovertext}<extra></extra>"
  };
  
  const layout = {
    mapbox: {
      style: "open-street-map",
      center: { lon: 68, lat: 48 },
      zoom: 4.8
    },
    margin: { l: 0, r: 0, t: 0, b: 0 },
    paper_bgcolor: "white",
    plot_bgcolor: "white",
    showlegend: false
  };
  
  Plotly.react("map", [trace], layout);
}

document.getElementById("pathogenSelect").addEventListener("change", updateMap);
document.getElementById("antibioticSelect").addEventListener("change", updateMap);

updateMap();
